<div class="signup-container">
  <div class="signup-card">
    <h2>Create Account</h2>
    
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Enter your full name"
          [class.error]="signupForm.get('name')?.invalid && signupForm.get('name')?.touched"
        />
        <div *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched" class="error-message">
          <div *ngIf="signupForm.get('name')?.errors?.['required']">Name is required</div>
          <div *ngIf="signupForm.get('name')?.errors?.['minlength']">Name must be at least 2 characters</div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.error]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
        />
        <div *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched" class="error-message">
          <div *ngIf="signupForm.get('email')?.errors?.['required']">Email is required</div>
          <div *ngIf="signupForm.get('email')?.errors?.['email']">Please enter a valid email</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.error]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
        />
        <div *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched" class="error-message">
          <div *ngIf="signupForm.get('password')?.errors?.['required']">Password is required</div>
          <div *ngIf="signupForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Confirm your password"
          [class.error]="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched"
        />
        <div *ngIf="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched" class="error-message">
          <div *ngIf="signupForm.get('confirmPassword')?.errors?.['required']">Please confirm your password</div>
          <div *ngIf="signupForm.get('confirmPassword')?.errors?.['passwordMismatch']">Passwords do not match</div>
        </div>
      </div>

      <div *ngIf="(authState$ | async)?.error" class="error-message global-error">
        {{ (authState$ | async)?.error }}
      </div>

      <button
        type="submit"
        class="signup-button"
        [disabled]="signupForm.invalid || (authState$ | async)?.loading"
      >
        <span *ngIf="(authState$ | async)?.loading">Creating Account...</span>
        <span *ngIf="!(authState$ | async)?.loading">Create Account</span>
      </button>
    </form>

    <div class="login-link">
      <p>Already have an account? <a (click)="goToLogin()" class="link">Login here</a></p>
    </div>
  </div>
</div>
