<div class="login-container">
  <div class="login-card">
    <h2>Login to Banking App</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-message">
          <div *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</div>
          <div *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
          <div *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</div>
          <div *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div *ngIf="(authState$ | async)?.error" class="error-message global-error">
        {{ (authState$ | async)?.error }}
      </div>

      <button
        type="submit"
        class="login-button"
        [disabled]="loginForm.invalid || (authState$ | async)?.loading"
      >
        <span *ngIf="(authState$ | async)?.loading">Logging in...</span>
        <span *ngIf="!(authState$ | async)?.loading">Login</span>
      </button>
    </form>

    <div class="signup-link">
      <p>Don't have an account? <a (click)="goToSignup()" class="link">Sign up here</a></p>
    </div>
  </div>
</div>
