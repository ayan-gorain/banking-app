<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="w-full max-w-md p-8 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create Bank Account</h2>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      
      <div>
        <label class="block text-gray-700 mb-2">Account Holder</label>
        <input 
          type="text" 
          [ngModel]="accountHolderName" 
          name="accountHolderName" 
          readonly
          class="w-full px-4 py-2 border rounded-lg bg-gray-100 text-gray-700"
        />
      </div>

      <div>
        <label class="block text-gray-700 mb-2">Initial Balance</label>
        <input 
          type="number" 
          [(ngModel)]="balance" 
          name="balance" 
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button 
        type="submit" 
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
      >
        Create Account
      </button>

      <div *ngIf="error" class="text-red-500 text-sm text-center">
        {{ error }}
      </div>

    </form>
  </div>
</div>
