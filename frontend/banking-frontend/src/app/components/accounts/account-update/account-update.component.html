<div class="max-w-md mx-auto bg-white p-6 rounded shadow mt-8">
  <h2 class="text-2xl font-bold mb-4 text-center">Update Bank Account</h2>

  <form (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-gray-700">Account Number</label>
      <input type="text" [(ngModel)]="accountNumber" name="accountNumber" readonly
        class="w-full px-3 py-2 border rounded bg-gray-100 text-gray-600"/>
    </div>

    <div>
      <label class="block text-gray-700">Account Holder Name</label>
      <input type="text" [(ngModel)]="accountHolderName" name="accountHolderName" required
        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring"/>
    </div>

    <div>
      <label class="block text-gray-700">Balance</label>
      <input type="number" [(ngModel)]="balance" name="balance" min="0"  required
        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring"/>
    </div>

    <button type="submit"
      class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">
      Update Account
    </button>

    <div *ngIf="error" class="text-red-600 mt-2 text-center">
      {{ error }}
    </div>
  </form>
</div>
