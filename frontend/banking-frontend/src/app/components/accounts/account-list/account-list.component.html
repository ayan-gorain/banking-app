<div class="container mx-auto px-4 py-8">

  <!-- Header Buttons: Create Account & Transfer -->
  <div class="flex justify-center space-x-4 mb-8">
    <button routerLink="/createaccount"
            class="bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-lg shadow-lg transition">
      Create Account
    </button>

    <button routerLink="/transfer"
            class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-3 px-6 rounded-lg shadow-lg transition">
      Transfer
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="text-center text-blue-500 font-semibold py-4">
    Loading accounts...
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="text-center text-red-600 font-semibold py-4">
    {{ error }}
  </div>

  <!-- Accounts Grid -->
  <div *ngIf="!loading && !error"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

    <!-- Account Card -->
    <div *ngFor="let account of accounts"
         class="bg-white p-6 rounded-xl shadow-lg hover:shadow-xl transition transform hover:-translate-y-1">

      <!-- Account Holder Name -->
      <h2 class="text-2xl font-bold text-gray-800 mb-4">
        {{ account.accountHolderName }}
      </h2>

      <!-- Account Number -->
      <p class="text-gray-700 mb-2">
        <span class="font-semibold">Account Number:</span>
        {{ account.accountNumber }}
      </p>

      <!-- Account Balance -->
      <p class="text-green-600 font-semibold mb-4">
        <span class="font-semibold">Balance:</span> {{ account.balance | currency }}
      </p>

      <!-- Action Buttons -->
      <div class="flex flex-col space-y-3">
        <!-- Deposit Button -->
        <button [routerLink]="['/deposits', account._id || account.id]"
                class="bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg shadow transition">
          Deposit
        </button>

        <!-- Withdraw Button -->
        <button [routerLink]="['/withdrawl', account._id || account.id]"
                class="bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg shadow transition">
          Withdraw
        </button>

        <!-- Delete and Update Details Buttons -->
        <div class="flex space-x-3 mt-4">
          <button (click)="deleteAccount(account._id || account.id)"
                  class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg shadow transition">
            Delete
          </button>

          <button [routerLink]="['/updateaccount', account._id || account.id]"
                  class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-lg shadow transition">
            Update Details
          </button>
        </div>
      </div>
    </div>

  </div>
    <div class="text-center mt-12">
    <h2 class="text-xl font-semibold mb-4">Do you want to take a loan?</h2>
    <button routerLink="/loanlist"
            class="bg-purple-500 hover:bg-purple-600 text-white font-semibold py-3 px-6 rounded-lg shadow-lg transition">
      OK
    </button>
  </div>
</div>
